<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Utsav Nandy Portfolio</title>

</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header" role="banner">
    <nav class="navbar" aria-label="Main navigation">
      <a class="logo" href="index.html">Utsav Nandy</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" tabindex="-1">
    <section aria-labelledby="contact-title" class="page-section">
      <h1 id="contact-title">Contact Me</h1>
      <p>Use the form below to send a message. All fields are keyboard accessible and properly labelled.</p>

      <form class="contact-form" aria-labelledby="contact-title" action="#" method="post">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" autocomplete="name" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" autocomplete="email" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required aria-required="true"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>&copy; 2026 Utsav Nandy. All rights reserved.</p>
  </footer>
</body>
</html>
